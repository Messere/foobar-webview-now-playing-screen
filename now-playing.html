<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="side layout-variant-1">
            <div class="artwork-wrap">
                <div class="cdborder">
                    <img src="cd.png" class="cd" />
                    <img src="cd.png" class="cdbg" />
                </div>
                <img src="cd.png" class="artwork" />
            </div>
        </div>
        <ul class="meta-container">
            <li>
                <span class="artist">The Album Artist</span>
            </li>
            <li>
                <span class="album">Album Name</span>
            </li>
            <li>
                <span class="section">Section title:</span>
                <span class="title">The maginificent track title</span>
            </li>
            <li class="meta-detail">detail</li>
            <li class="meta">
                <img src="flags/EU.svg" class="country">
                <span class="year">2026</span>
                <span class="keywords">some ᛫ keywords</span><br>
                <span class="technical">
                </span>
                <div class="vu-meters">
                    <div class="vu-meter vu-fl">fl</div>
                    <div class="vu-meter vu-fr">fr</div>
                    <div class="vu-meter vu-fc">fc</div>
                    <div class="vu-meter vu-lfe">lfe</div>
                    <div class="vu-meter vu-bl">bl</div>
                    <div class="vu-meter vu-br">br</div>
                    <div class="vu-meter vu-fcl">fcl</div>
                    <div class="vu-meter vu-fcr">fcr</div>
                    <div class="vu-meter vu-bc">bc</div>
                    <div class="vu-meter vu-sl">sl</div>
                    <div class="vu-meter vu-sr">sr</div>
                    <div class="vu-meter vu-tc">tc</div>
                    <div class="vu-meter vu-tfl">tfl</div>
                    <div class="vu-meter vu-tfc">tfc</div>
                    <div class="vu-meter vu-tfr">tfr</div>
                    <div class="vu-meter vu-tbl">tbl</div>
                    <div class="vu-meter vu-tbc">tbc</div>
                    <div class="vu-meter vu-tbr">tbr</div>
                </div>
                <span class="time-container">
                    <span class="time">00:00</span><span class="total"
                        data-format="[%length%]">00:00</span>
                </span>
                <span class="status button" aria-roledescription="toggle play / pause" role="button" tabindex="2">
                    <span class="status-value">stopped</span>
                    <span class="status-track" data-format="$if(
                            $or(
                                $stricmp($left(%path%,8),'https://'),
                                $stricmp($left(%path%,7),'http://')
                            ),
                            $if($stricmp(%filename_ext%,'stream.flac.ogg'),'remote','stream'),)
                            [ track %track number%[ of $num(%totaltracks%,1)]]"></span>
                </span>
            </li>
        </ul>
        <div class="side layout-variant-2">
            <div class="artwork-wrap">
                <div class="cdborder">
                    <img src="cd.png" class="cd" />
                    <img src="cd.png" class="cdbg" />
                </div>
                <img src="cd.png" class="artwork" />
            </div>
        </div>
    </div>
    <script type="text/javascript" src="js/countries.js"></script>
    <script type="text/javascript" src="js/image-bg-generator.js"></script>
    <script type="text/javascript" src="js/artwork-generator.js"></script>
    <script type="text/javascript" src="js/parentheses.js"></script>
    <script type="text/javascript" src="js/vu-meter.js"></script>
    <script type="text/javascript" src="js/now-playing-screen.js"></script>
    <script type="text/javascript">
        let main = (config) => {
            const cssConfigKeys = {
                colorScheme: 'color-scheme',
                fontFamily: 'font-family',
                fontVariant: 'font-variant',
                inverseLayout: '--inverse-layout',
                flipDuration: '--flip-duration',
                cdSpinDuration: '--cd-spin-duration',
                cdHideDuration: '--cd-hide-duration',
                colorMuteFactor: '--color-mute-factor',
                bgStaticColor: '--bg-static-color',
                vuMeterFontColor: '--vu-meter-font-color',
            }

            for (const [key, value] of Object.entries(cssConfigKeys)) {
                if (key in config) {
                    document.documentElement.style.setProperty(value, config[key]);
                }
            }

            countries = Object.assign(countries, config.countryMappings);

            if (config.bgFogEnabled) {
                const loadScript = function(src, onload) {
                    let script = document.createElement('script');
                    script.onload = onload;
                    script.src = src;
                    script.async = false;
                    document.head.appendChild(script);
                }

                loadScript('js/three.min.js', () => {
                    loadScript('js/vanta.fog.min.js', () => {
                        VANTA.FOG({
                            el: "body",
                            mouseControls: false,
                            touchControls: false,
                            gyroControls: false,
                            minHeight: 200.00,
                            minWidth: 200.00,
                            highlightColor: config.bgFogHighlightColor,
                            midtoneColor: config.bgFogMidtoneColor,
                            lowlightColor: config.bgFogLowlightColor,
                            baseColor: config.bgFogBaseColor,
                        });
                    })
                });
            }

            document.body.classList.add(`alignment-${config.alignment}`);
            document.querySelector('.artist').setAttribute('data-format', config.formatArtist);
            document.querySelector('.album').setAttribute('data-format', config.formatAlbum);
            document.querySelector('.section').setAttribute('data-format', config.formatSection);
            document.querySelector('.title').setAttribute('data-format', config.formatTitle);
            document.querySelector('.year').setAttribute('data-format', config.formatDate);
            document.querySelector('.keywords').setAttribute('data-format', config.formatKeywords);

            const detailTemplate = document.querySelector('.meta-detail');
            config.formatDetails.forEach(d => {
                const detail = detailTemplate.cloneNode(true);
                detail.setAttribute('data-format', d.format);
                detail.setAttribute('data-prefix', d.title);
                detailTemplate.after(detail);
                detailTemplate.after(document.createTextNode("\n \n"));
            });
            detailTemplate.style.display = 'none';

            const technicalSpan = document.querySelector('.technical');
            config.formatChips.forEach(d => {
                const span = document.createElement('span');
                span.setAttribute('data-format', d.format);
                if ((d.suffix || '') !== '') {
                    span.setAttribute('data-suffix', d.suffix);
                }
                if ((d.prefix || '') !== '') {
                    span.setAttribute('data-prefix', d.prefix);
                }
                technicalSpan.append(span);
            })

            const containerLtr = document.querySelector('.container');
            const containerRtl = containerLtr.cloneNode(true);
            containerLtr.parentElement.appendChild(containerRtl);
            containerLtr.classList.add('container-ltr');
            containerRtl.classList.add('container-rtl');

            const a = new NowPlayingScreen(
                chrome.webview.hostObjects.sync.foo_uie_webview,
                config.coverStretchThreshold,
                config.coverGeneratorStrLen,
                config.coverGeneratorCharScaleFactor,
                config.defaultTimeDisplay,
                config.formatCountry,
            );

            window.onPlaybackEdited = () => { a.refresh() }
            window.onPlaybackDynamicTrackInfo = () => { a.refresh(); a.setArtwork() }
            window.onPlaybackDynamicInfo = () => { a.refresh() }
            window.onPlaybackStarting = (command, paused) => { a.status(paused ? 'paused' : 'playing') }
            window.onPlaybackPause = (paused) => { a.status(paused ? 'paused' : 'playing') }
            window.onPlaybackStarted = () => { a.refresh() }
            window.onPlaybackNewTrack = () => { a.refresh(); a.setArtwork() }
            window.onPlaybackTime = (s) => { a.setTime(s) }
            window.onPlaybackSeek = (s) => { a.setTime(s) }

            const vu = new VUMeter(
                chrome.webview.hostObjects.sync.foo_uie_webview,
                config.vuMeterEnabled,
                config.vuMeterColor,
            );
            window.onPlaybackStop = (reason) => {
                if (config.vuMeterEnabled) vu.onStop();
                a.status(`stopped by ${reason.toLowerCase()}`);
            }

            if (config.vuMeterEnabled) {
                window.chrome.webview.addEventListener("sharedbufferreceived", vu.onSharedBufferReceived.bind(vu));

                if ("requestSharedBuffer" in chrome.webview.hostObjects.sync.foo_uie_webview) {
                    chrome.webview.hostObjects.sync.foo_uie_webview.requestSharedBuffer();
                }
            }
        }

        const defaultConfig = {
            alignment: 'flip',
            coverStretchThreshold: 0.10,
            coverGeneratorStrLen: 5,
            coverGeneratorCharScaleFactor: 0.7,
            bgFogEnabled: true,
            bgFogHighlightColor: '#310c1d',
            bgFogMidtoneColor: '#c03f26',
            bgFogLowlightColor: '#3e1010',
            bgFogBaseColor: '#a02424',
            vuMeterEnabled: true,
            vuMeterColor: 'red',
            defaultTimeDisplay: 'elapsed',

            countryMappings: {
                uk: "GB",
                "united kingdom": "GB",
                england: "GB",
                "united states": "US",
                "venezuela": "VE",
                "north korea": "KP",
                "south korea": "KR",
                korea: "KR",
                iran: "IR",
                russia: "RU",
            },

            formatArtist: '[%album artist%]',
            formatAlbum: '[%album%]',
            formatSection: '',
            formatTitle: '[%title%]',

            formatDate: "[%date%]",
            formatKeywords: "[$meta_sep(genre,' ᛫ ')]",
            formatCountry: "[%country%]",

            formatDetails: [
                {title: 'performed by: ', format: "[$if($stricmp(%track artist%,%album artist%),,%track artist%)]"},
                {title: 'composed by: ', format: "[%composer%]"},
                {title: "conducted by: ", format: "[%conductor%]"},
                {title: "venue: ", format: "[%venue%]"},
                {title: "stream URL: ", format: "[$if($and($or($stricmp($left(%path%,8),'https://'),$stricmp($left(%path%,7),'http://')),$not($stricmp(%filename_ext%,'stream.flac.ogg'))),%path%,)]"},
                {title: "URL: ", format: "[%url%]"},
            ],

            formatChips: [
                {format: "[%codec_long%]"},
                {format: "[%bitrate%]", suffix: "kb/s"},
                {format: "[$puts(sr,$info(samplerate))$puts(sr1000,$div($get(sr),1000))$puts(r,$div($sub($get(sr),$mul($get(sr1000),1000)),100))$get(sr1000)$ifequal($get(r),0,,.$get(r))]", suffix: "kHz"},
                {format: "[%__bitspersample%]", suffix: "bit"},
                {format: "$channels()"},
                {format: "[%album dynamic range%]", prefix: "dr"},
            ]
        };

        fetch('./config.json', {cache: "no-store"}).then(
            r => r.json()
        ).catch(
            (e) => {
                if (e.message !== 'Failed to fetch') {
                    alert(`User configuration error:\n\n${e}\n\nDefault connfiguration will be used.`);
                }
                main(defaultConfig)
            }
        ).then(
            config => main(Object.assign({}, defaultConfig, config))
        )

</script>
</body>

</html>
